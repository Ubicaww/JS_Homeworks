<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task list</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  
  <ul class="task-list">
    <li class="task-item">
      Task 1 <button class="delete-btn">Delete</button>
    </li>
    <li class="task-item">
      Task 2 <button class="delete-btn">Delete</button>
    </li>
    <li class="task-item">
      Task 3 <button class="delete-btn">Delete</button>
    </li>
  </ul>

  <form class="task-form">
    <input type="text" class="task-input" placeholder="Add a new task">
    <button type="submit">Add</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
